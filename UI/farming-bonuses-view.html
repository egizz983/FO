<div class="flex gap-8">
    <!-- LEFT: Farming Bonuses (70%) -->
    <div class="w-[70%]">
        <!-- FARMING BONUSES PANEL -->
        <div class="farming-bonuses-panel bg-white border border-slate-200 rounded-xl p-8">
            <!-- Header: Title + Levels -->
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-emerald-500">Farming Bonuses</h2>
                <div class="farming-level-top text-lg font-bold text-emerald-500 text-right">
                    <div>Farming Level <span id="farming-level-value" class="level-value text-slate-900">0</span></div>
                    <div>Summonings Level <span id="summoning-level-value" class="level-value text-slate-900">0</span></div>
                </div>
            </div>

            <div class="h-1 bg-emerald-500 mb-6"></div>

            <!-- Bonus Type Buttons -->
            <div class="flex gap-2 mb-6 flex-wrap" id="bonus-buttons-container">
                <!-- Populated by JS -->
            </div>

            <!-- Bonus Viewport: Shows only selected bonus -->
            <div id="bonus-viewport" class="bg-slate-50 border border-slate-200 rounded-lg p-6 min-h-96">
                <!-- Populated by JS -->
            </div>
        </div>

        <!-- OTHER BONUSES PANEL -->
        <div id="other-bonuses-panel"></div>
    </div>

    <!-- RIGHT: State Inspector (30%) -->
    <div class="w-[30%]">
        <div id="state-inspector-panel"></div>
    </div>
</div>
