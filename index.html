<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farming Optimizer - Legends of IdleOn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">
    <!-- HEADER: Simple Load Data + Title -->
    <header class="bg-white border-b border-slate-200 py-6 px-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center gap-12">
                <!-- LEFT: Load Section -->
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-emerald-600 mb-4">Load Character Data</h2>
                    <div class="flex gap-3 items-center">
                        <input type="text" id="json-paste" placeholder="Paste full JSON content here..." class="flex-1 h-11 px-4 text-base border-2 border-slate-300 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition">
                        <button onclick="loadJsonData()" class="h-11 px-8 bg-pink-500 text-white font-bold rounded-lg hover:bg-pink-600 transition transform hover:-translate-y-0.5 whitespace-nowrap">LOAD</button>
                    </div>
                </div>

                <!-- RIGHT: Title Section -->
                <div class="flex-shrink-0 text-right">
                    <h1 class="text-4xl font-bold text-emerald-500 leading-tight mb-1">Farming Optimizer</h1>
                    <p class="text-base text-gray-600">Legends of IdleOn</p>
                </div>
            </div>
            <div class="h-1 bg-emerald-500 mt-6"></div>

            <!-- Navigation -->
            <div class="flex items-center gap-3 mt-5">
                <button id="btn-toggle-settings" class="nav-btn-inactive px-4 py-2 font-semibold rounded-lg border-2 border-slate-300 transition text-sm">
                    ⚙ Settings
                </button>
                <div class="w-px h-6 bg-slate-300 mx-1"></div>
                <button data-view="farming" class="nav-view-btn nav-btn-active px-4 py-2 font-semibold rounded-lg transition text-sm">
                    🌾 Farming Bonuses
                </button>
                <button data-view="landrank" class="nav-view-btn nav-btn-inactive px-4 py-2 font-semibold rounded-lg border-2 border-slate-300 transition text-sm">
                    🏆 Land Rank Optimizer
                </button>
            </div>
        </div>
    </header>

    <main class="w-full px-8 py-10">
        <!-- LOAD JSON NOTICE (Full Width) -->
        <div id="json-load-notice" class="inline-block bg-amber-100 border-l-4 border-amber-500 px-4 py-3 rounded text-sm text-amber-900 mb-6">
            ⚠️ <strong>Load JSON data first</strong> to enable manual inputs and trigger calculations
        </div>

        <!-- SETTINGS PANEL (collapsible) -->
        <div id="settings-panel" class="mb-8"></div>

        <!-- FARMING BONUSES VIEW -->
        <div id="view-farming" class="view-content"></div>

        <!-- LAND RANK OPTIMIZER VIEW -->
        <div id="view-landrank" class="view-content" style="display:none"></div>
    </main>

    <footer class="text-center py-8 px-8 border-t border-slate-200 text-slate-600 text-sm bg-white">
        Legends of IdleOn Farming Optimizer v2.0
    </footer>
    <script src="GlobalFunctions.js"></script>
    <script src="CustomList.js"></script>
    <script src="models.js"></script>
    <script src="state.js"></script>
    <!-- State Management System -->
    <script src="stateManager.js"></script>
    <script src="statePersistence.js"></script>
    <script src="stateAutoWire.js"></script>
    <script src="stateInspector.js"></script>
    <!-- End State Management System -->
    <script src="imageLinks.js"></script>
    <script src="Number2Letter.js"></script>
    <script src="calcFormulas.js"></script>
    <script src="parsers/farmingParser.js"></script>
    <script src="parsers/alchemyParser.js"></script>
    <script src="parsers/achievementsParser.js"></script>
    <script src="parsers/miscParser.js"></script>
    <script src="parsers/shinyPetsParser.js"></script>
    <script src="parsers/starSignsParser.js"></script>
    <script src="parsers/killsLeftToAdvanceParser.js"></script>
    <script src="parsers/skillLevelsParser.js"></script>
    <script src="parsers/lv0Parser.js"></script>
    <script src="UIbreakdowns.js"></script>
    <script>
        const optimizer = new FarmingOptimizer(); // main optimizer instance that holds state and logic
        // Data
        const farmingBonuses = [
            { name: "Evolution",     totalLabel: "Total Evolution chance", totalValue: "245%" },
            { name: "Overgrowth",    totalLabel: "Total Overgrowth",      totalValue: "320%" },
            { name: "Crop Value",    totalLabel: "Max Crop Value",        totalValue: "185%" },
            { name: "Growth Speed",  totalLabel: "Total Growth Speed",    totalValue: "420%" },
            { name: "Soil EXP",      totalLabel: "Total EXP Multiplier",  totalValue: "280%" }
        ];

        // Companions data structure
        const companionsList = [
            { id: "babaMummy_0", name: "King Doot", bonus: "All Divinities from World 5 count as Active", imageKey: "kingDoot" },
            { id: "potato_19", name: "Mashed Potato", bonus: "+5% Ballot Bonus Multi", imageKey: "mashedPotato" },
            { id: "rift2_1", name: "Rift Slug", bonus: "+25 Lv for all Talents", imageKey: "riftSlug" },
            { id: "w7a8_39", name: "Pufferblob", bonus: "+50% Meritocracy Bonus Multi", imageKey: "pufferblob" },
            { id: "Crystal6_41", name: "Crystal Cuttlefish", bonus: "+40% Ballot Bonus Multi", imageKey: "crystalCuttlefish" },
            { id: "w7b11_55", name: "Pirate Deckhand", bonus: "×1.15 ALL Research Grid bonuses", imageKey: "pirateDeckhand" },
            { id: "rift4_88", name: "Rift Hivemind", bonus: "+50% Prisma Bubble bonus & +5 Prisma Bubbles", imageKey: "riftHivemind" },
            { id: "poppy_161", name: "Poppy", bonus: "2x bonuses from Bonus Ballot & Multi Meritocracy", imageKey: "poppy" },
            { id: "w6b2b_162", name: "Wickerlight Spirit", bonus: "All meals 5x cheaper & 1.25x higher bonuses", imageKey: "wickerlightSpirit" },
            { id: "w7b7_147", name: "Mantaray", bonus: "All Button bonuses in W7 are 1.50x bigger", imageKey: "mantaray" },
            { id: "reindeer_27", name: "Spirit Reindeer", bonus: "2.00x Gold Ball Shop Bonuses", imageKey: "spiritReindeer" }
        ];



        // Lab Items Data
        const labItemsList = [
            { id: 'lab-chemistry-set', name: 'My 1st Chemistry Set', statePath: 'lab.my1stChemistrySet', imageKey: 'my1stChemistrySet' },
            { id: 'lab-stamp-book', name: 'Certified Stamp Book', statePath: 'lab.certifiedStampBook', imageKey: 'certifiedStampBook' },
            { id: 'lab-spelunker-obol', name: 'Spelunker Obol', statePath: 'lab.spelunkerObol', imageKey: 'spelunkerObol' },
            { id: 'lab-meal-black-diamond', name: 'Meal Black Diamond Rhinestone', statePath: 'lab.mealBlackDiamondRhinestone', imageKey: 'mealBlackDiamondRhinestone' }
        ];

        // Render lab items list
        function renderLabItems() {
            const labContainer = document.getElementById('lab-items-grid');
            if (!labContainer) return;
            
            // Clear existing items
            labContainer.innerHTML = '';

            labItemsList.forEach(item => {
                const imageUrl = window.getImageUrl('lab', item.imageKey);
                const labItem = document.createElement('div');
                labItem.className = 'lab-item';
                
                // Check if lab item is selected in state
                const isSelected = window.farmingState[item.statePath.split('.')[0]][item.statePath.split('.')[1]] === 1;
                if (isSelected) {
                    labItem.classList.add('selected');
                }
                
                labItem.innerHTML = `
                    <div class="lab-checkbox-wrapper">
                        <input type="checkbox" id="${item.id}" class="lab-checkbox" ${isSelected ? 'checked' : ''}>
                    </div>
                    <div class="lab-checkmark">✓</div>
                    <div class="lab-image">
                        <img src="${imageUrl}" alt="${item.name}" onerror="this.style.opacity='0.5'">
                    </div>
                    <div class="lab-name">${item.name}</div>
                `;

                // Add click handler to entire card
                labItem.addEventListener('click', function(e) {
                    e.preventDefault();
                    const checkbox = labItem.querySelector(`#${item.id}`);
                    checkbox.checked = !checkbox.checked;
                    
                    // Toggle selected class
                    labItem.classList.toggle('selected');
                    
                    // Update state through StateManager
                    const newValue = checkbox.checked ? 1 : 0;
                    window.StateManager.updateState(item.statePath, newValue);
                    console.log(`Lab item ${item.name} toggled: ${checkbox.checked}`);
                });

                labContainer.appendChild(labItem);
            });
        }

        // Render companions list
        function renderCompanions() {
            const companionsContainer = document.getElementById('companions-list');
            if (!companionsContainer) return;
            
            // Clear existing companions
            companionsContainer.innerHTML = '';

            companionsList.forEach(companion => {
                const imageUrl = window.getImageUrl('companions', companion.imageKey);
                
                const companionItem = document.createElement('div');
                companionItem.className = 'companion-item';
                
                // Check if companion is selected in state
                const isSelected = window.farmingState.companion[companion.id] === 1;
                if (isSelected) {
                    companionItem.classList.add('selected');
                }
                
                companionItem.innerHTML = `
                    <div class="companion-checkbox-wrapper">
                        <input type="checkbox" id="companion-${companion.id}" class="companion-checkbox" ${isSelected ? 'checked' : ''}>
                    </div>
                    <div class="companion-checkmark">✓</div>
                    <div class="companion-image">
                        <img src="${imageUrl}" alt="${companion.name}" onerror="this.style.opacity='0.5'">
                    </div>
                    <div class="companion-info">
                        <div class="companion-name">${companion.name}</div>
                        <div class="companion-bonus">${companion.bonus}</div>
                    </div>
                `;

                // Add click handler to entire card
                companionItem.addEventListener('click', function(e) {
                    e.preventDefault();
                    const checkbox = companionItem.querySelector(`#companion-${companion.id}`);
                    checkbox.checked = !checkbox.checked;
                    
                    // Toggle selected class
                    companionItem.classList.toggle('selected');
                    
                    // Update state through StateManager
                    const newValue = checkbox.checked ? 1 : 0;
                    window.StateManager.updateState('companion.' + companion.id, newValue);
                    console.log(`Companion ${companion.name} toggled: ${checkbox.checked}`);
                });

                companionsContainer.appendChild(companionItem);
            });
        }

        function renderGroups(container, groupedData) {
            if (!groupedData || !groupedData.groups) return;
            
            groupedData.groups.forEach(group => {
                // Create group wrapper container
                const groupWrapper = document.createElement('div');
                groupWrapper.className = 'bonus-group';
                
                // Group header (if name exists)
                if (group.name) {
                    const groupHeader = document.createElement('div');
                    groupHeader.className = 'group-header';
                    const totalValue = typeof group.total === 'function' ? group.total() : group.total;
                    groupHeader.innerHTML = `<div style="display: flex; justify-content: space-between; align-items: center;"><h4 style="margin: 0;">${group.name}</h4><span class="group-total" style="font-weight: 700; color: var(--sub-value);">${totalValue || ''}</span></div>`;
                    groupWrapper.appendChild(groupHeader);
                }
                
                // Group items container
                const itemsContainer = document.createElement('div');
                itemsContainer.className = 'group-items';
                
                // Group items (all visible)
                if (group.items && group.items.length > 0) {
                    group.items.forEach(item => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'sub-breakdown';
                        itemDiv.innerHTML = `
                            <div class="item-name">${item.label}</div>
                            <div class="item-bonus">${item.value}</div>
                            <div class="item-threshold">${item.threshold || '-'}</div>
                        `;
                        itemsContainer.appendChild(itemDiv);
                    });
                }
                
                groupWrapper.appendChild(itemsContainer);
                container.appendChild(groupWrapper);
            });
        }

        function calculateEvolutionTotal() {
            const state = window.farmingState;

            const marketDay = farmingState.market.day.find(u => u.index === 6)?.getBonus() || 1;

            const summonerWinBonusTotal = window.getWinBonus(10).toMulti();

            const holeLampBonusTotal = window.getLampBonus().toMulti();

            const monumentTotal = getmonumentROGbonuses(2, 4).toMulti();

            const sushiBonusTotal = getRoGBonusQTY(35).toMulti();

            const cropChapterBubbleTotal = (window.calculateBubbleBonus(state.alchemy.cropChapterBubblebonus, 12, 50) * window.calculateTomeScorePer2000()).toMulti();

            const croppiusMapperTotal = (window.calculateBubbleBonus(state.alchemy.croppiusMapperBubblebonus, 5, 70) * window.calculateKillsLeftToAdvance()).toMulti();

            const flavorgilVial = getVialBonus(66,window.farmingState.alchemy.flavorgilBonus).toMulti();

            const cardBonusTotal = getCardBonus(window.farmingState.miscBonuses.jellofishcard).toMulti();

            const billJackPepperTotal = window.getMealBonus(62, state.meals.evoBillJackPepperRibbonLevel, state.meals.evoBillJackPepper).toMulti();
            
            const nyanborgirTotal = (window.getMealBonus(66, state.meals.evoNyanborgirRibbonLevel, state.meals.evoNyanborgir) * Math.ceil((c.asNumber(state.levels.summoning) + 1) / 50)).toMulti();

            const vaultUpgradeTotal = window.getVaultUpgBonus(78).toMulti();

            const evoStamp = getStampBonusOfType(1,47,window.farmingState.miscBonuses.evoCropEvoStamp).toMulti();

            const grimoireTotal = grimoireUpgBonus().toMulti();
            
            const achievementTotal = (5 * (state.achievements.farmingEvoLilOvergrowth === -1 ? 1 : 0)).toMulti();

            const killroybonus = getKillroyBonus();

            const marketNight = farmingState.market.night.find(u => u.index === 11)?.getBonus() || 1;

            const skillMasteryBonus = getSkillMasteryBonus();

            const starsign = (getStarSigns(65) * window.farmingState.levels.farming).toMulti();

            const landRanksTotal = getLandRankUpgBonusTOTAL(0) || 1;
            
            const landrankUpg0 = (farmingState.landRank.upgrades[0].getBonus() * farmingState.landRank.stats.first + window.farmingState.miscBonuses.votingBonus29).toMulti();
            
            const massIrrigationBonus = getTalentNumber(1,205);
            
            const exoticMultipliers = state.market.exotic
                .filter(u => u.group === "Evolution" && u.isMultiplier)
                .reduce((prod, u) => prod * u.getBonus().toMulti(), 1);

            const exoticAdditives = state.market.exotic
                .filter(u => u.group === "Evolution" && !u.isMultiplier)
                .reduce((sum, u) => sum + u.getBonus(), 0).toMulti();

            const buttonBonus = getButtonBonuses(5,window.farmingState.miscBonuses.evoButtonPressCount).toMulti();
            
            const stickerBonus = getStickerBonus(4).toMulti();

            // Multiply all with full precision, then format for display
            let result = marketDay;
            result *= summonerWinBonusTotal;
            result *= holeLampBonusTotal;
            result *= monumentTotal;
            result *= sushiBonusTotal;
            result *= cropChapterBubbleTotal;
            result *= croppiusMapperTotal;
            result *= flavorgilVial;
            result *= cardBonusTotal;
            result *= billJackPepperTotal;
            result *= nyanborgirTotal;
            result *= vaultUpgradeTotal;
            result *= evoStamp;
            result *= grimoireTotal;
            result *= achievementTotal;
            result *= killroybonus;
            result *= marketNight;
            result *= skillMasteryBonus;
            result *= starsign;
            result *= landRanksTotal;
            result *= landrankUpg0;
            result *= massIrrigationBonus;
            result *= exoticMultipliers;
            result *= exoticAdditives;
            result *= buttonBonus;
            result *= stickerBonus;

            return result.toExponential(4);
        }
        function calculateOverGrowthTotal(){
             const state = window.farmingState;
             const nightmarket = Math.max(  1, window.farmingState.market.night?.find(u => u.index === 13)?.getBonus()  ).toMulti();
             const pristinecharm = (50 *(window.farmingState?.pristineCharms?.[11] || 0)).toMulti();
             const starsignsOG = getStarSigns(67).toMulti();
             const meritshop = (2 * window.farmingState.miscBonuses.ogMeritShop).toMulti();
             const achievement = (15 * (window.farmingState.achievements.farmingOgBigTimeLandOwner == -1 ? 1 : 0) ).toMulti();
             const landranktotal = getLandRankUpgBonusTOTAL(3).toMulti();
             const exotic46 = farmingState.market.exotic.find(u => u.index === 46)?.getBonus().toMulti();
             const exotic47 = farmingState.market.exotic.find(u => u.index === 47)?.getBonus().toMulti();
             let result = Math.pow(0.4, 1) * OGMulti() * 1000;
             return (result).toFixed(1);
        }

        function calculateSoilExpTotal(){
            const basketBonus      = window.farmingState?.market?.day?.find(u => u.index === 9)?.getBonus().toMulti(); // Day market
            const prevPlotRank     = c.asNumber(window.farmingState.landRank.stats.first ); // we will simplify and use rank[0][0] , engine uses used plotindex -1 
            const chainBonus       = 1 + (window.farmingState.landRank.upgrades[2].getBonus() * prevPlotRank) / 100; 
            const landRankBonus    = getLandRankUpgBonusTOTAL(2).toMulti(); // sum of landrank 7 and 13 bonuses / 100 + 1
            
            return basketBonus * chainBonus * landRankBonus;

        }

    


        function renderFarmingBonuses() {
            const buttonsContainer = document.getElementById('bonus-buttons-container');
            const viewport = document.getElementById('bonus-viewport');
            
            // Calculate Evolution total dynamically
            const evolutionTotal = calculateEvolutionTotal();
            
            // Calculate Overgrowth total dynamically
            const overgrowthTotal = "×" + calculateOverGrowthTotal();
            
            // Calculate Crop Value Cap dynamically
            const cropValueCap = window.getCropValueCap().toFixed(0);
            
            // Calculate Growth Speed total dynamically
            const growthSpeedTotal = "×" + window.calculateGrowthRate().toFixed(2);
            
            // Soil EXP total (placeholder for now)
            const soilExpTotal = "×" + calculateSoilExpTotal().toFixed(2); // Replace with actual Soil EXP calculation when available
            
            const bonusesWithCalculated = farmingBonuses.map(bonus => 
                bonus.name === "Evolution" 
                    ? { ...bonus, totalValue: evolutionTotal }
                    : bonus.name === "Overgrowth"
                    ? { ...bonus, totalValue: overgrowthTotal }
                    : bonus.name === "Crop Value"
                    ? { ...bonus, totalValue: cropValueCap }
                    : bonus.name === "Growth Speed"
                    ? { ...bonus, totalValue: growthSpeedTotal }
                    : bonus.name === "Soil EXP"
                    ? { ...bonus, totalValue: soilExpTotal }
                    : bonus
            );
            
            // Create buttons for each bonus type
            buttonsContainer.innerHTML = bonusesWithCalculated.map((bonus, index) => `
                <button class="bonus-tab-button ${index === 0 ? 'active' : ''}" data-bonus-name="${bonus.name}">
                    ${bonus.name}
                </button>
            `).join('');

            // Add click handlers to buttons
            document.querySelectorAll('.bonus-tab-button').forEach(button => {
                button.addEventListener('click', () => {
                    // Remove active class from all buttons
                    document.querySelectorAll('.bonus-tab-button').forEach(btn => btn.classList.remove('active'));
                    // Add active class to clicked button
                    button.classList.add('active');
                    // Render the selected bonus
                    const selectedBonus = bonusesWithCalculated.find(b => b.name === button.dataset.bonusName);
                    renderBonusViewport(selectedBonus);
                });
            });

            // Render the first bonus by default
            renderBonusViewport(bonusesWithCalculated[0]);
        }

        function renderBonusViewport(bonus) {
            const viewport = document.getElementById('bonus-viewport');
            
            // Create the total row and breakdown container
            viewport.innerHTML = `
                <div class="total-row mb-4">
                    <span class="sub-name">${bonus.totalLabel}:</span>
                    <span class="sub-value">${bonus.totalValue}</span>
                </div>
                <div class="column-header">
                    <span class="col-name">Name</span>
                    <span class="col-bonus">Bonus</span>
                    <span class="col-threshold">Threshold</span>
                </div>
                <div class="breakdown" id="breakdown-${bonus.name.toLowerCase().replace(/[^a-z0-9]/g, '-')}"></div>
            `;

            // Render the grouped breakdown
            const breakdownContainer = document.getElementById(`breakdown-${bonus.name.toLowerCase().replace(/[^a-z0-9]/g, '-')}`);
            const breakdowns = window.getFarmingBreakdowns();
            const groupedData = breakdowns[bonus.name] || {};
            renderGroups(breakdownContainer, groupedData);
        }

        function updateFarmingLevelDisplay() {
            const farmingEl   = document.getElementById('farming-level-value');
            const summoningEl = document.getElementById('summoning-level-value');

            if (farmingEl)   farmingEl.textContent   = window.farmingState.levels.farming   || 0;
            if (summoningEl) summoningEl.textContent = window.farmingState.levels.summoning || 0;
        }

        window.loadJsonData = function() {
            const input = document.getElementById('json-paste').value.trim();
            if (!input) {
                alert('Please paste your JSON data first!');
                return;
            }

            try {
                const match = input.match(/\{[\s\S]*\}/);
                if (!match) throw new Error("No JSON object found");

                const success = optimizer.loadPlayerData(match[0]);

                if (success) {
                    debugFarmingVariables();
                    alert('✅ JSON loaded successfully!');
                }
            } catch (e) {
                console.error(e);
                alert('Invalid JSON!\n\n' + e.message);
            }
        };


        function setupManualInputs() {
            // Talents are now handled by State Inspector auto-wiring via data-state-path attributes

            // Lab items are now handled by renderLabItems() click handlers

            // Other inputs
            const votingInput = document.getElementById('voting-bonus-29');
            if (votingInput) votingInput.addEventListener('input', () => {
                const value = parseFloat(votingInput.value) || 0;
                window.StateManager.updateState('miscBonuses.votingBonus29', value);
            });

            const tomeInput = document.getElementById('tome-total-points');
            if (tomeInput) tomeInput.addEventListener('input', () => {
                const value = parseFloat(tomeInput.value) || 0;
                window.StateManager.updateState('miscBonuses.tometotalpoints', value);
            });
        }

        // Sync all manual inputs with current state values
        function syncManualInputs() {
            // Lab items are already rendered with correct state in renderLabItems()
            // Re-render to ensure UI is in sync after state changes
            renderLabItems();

            // Other inputs
            const votingInput = document.getElementById('voting-bonus-29');
            if (votingInput) {
                votingInput.value = window.farmingState.miscBonuses.votingBonus29 || 0;
            }

            const tomeInput = document.getElementById('tome-total-points');
            if (tomeInput) {
                tomeInput.value = window.farmingState.miscBonuses.tometotalpoints || 0;
            }

            console.log('[UI] Manual inputs synced with state');
        }

        // Initialize
        // Helper function to hide/show the JSON load notice
        window.hideJsonLoadNotice = function() {
            const notice = document.getElementById('json-load-notice');
            if (notice) {
                notice.style.display = 'none';
                console.log('[UI] JSON load notice hidden - inputs enabled');
            }
        };

        window.initAfterUI = function() {
            // Initialize state management systems
            window.StateManager.registerRecalculationTriggers();
            window.StatePersistence.setupAutoSave();
            window.StatePersistence.loadUserSelections(); // Restore saved user selections
            window.StateAutoWire.wireAllInputs();

            // Disable all manual input fields until JSON is loaded
            window.StateAutoWire.setInputsDisabled(true);

            // Initialize State Inspector
            if (window.StateInspector && window.StateInspector.renderInspector) {
                window.StateInspector.renderInspector();
            }

            // Render UI and sync inputs with state
            renderLabItems();
            renderCompanions();
            syncManualInputs();
            renderFarmingBonuses();
            setupManualInputs();

            console.log('[UI] Ready');
        };
    </script>
    <script src="js/ui/navigation.js"></script>
    <script src="js/ui/uiLoader.js"></script>
    <script>
        window.addEventListener('load', loadUIpartials);
    </script>
</body>
</html>
