<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farming Optimizer - Legends of IdleOn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">
    <!-- HEADER: Simple Load Data + Title -->
    <header class="bg-white border-b border-slate-200 py-6 px-8">
        <div class="max-w-7xl mx-auto">
            <div class="flex justify-between items-center gap-12">
                <!-- LEFT: Load Section -->
                <div class="flex-1">
                    <h2 class="text-lg font-bold text-emerald-600 mb-4">Load Character Data</h2>
                    <div class="flex gap-3 items-center">
                        <input type="text" id="json-paste" placeholder="Paste full JSON content here..." class="flex-1 h-11 px-4 text-base border-2 border-slate-300 rounded-lg focus:outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-100 transition">
                        <button onclick="loadJsonData()" class="h-11 px-8 bg-pink-500 text-white font-bold rounded-lg hover:bg-pink-600 transition transform hover:-translate-y-0.5 whitespace-nowrap">LOAD</button>
                    </div>
                </div>

                <!-- RIGHT: Title Section -->
                <div class="flex-shrink-0 text-right">
                    <h1 class="text-4xl font-bold text-emerald-500 leading-tight mb-1">Farming Optimizer</h1>
                    <p class="text-base text-gray-600">Legends of IdleOn</p>
                </div>
            </div>
            <div class="h-1 bg-emerald-500 mt-6"></div>

            <!-- Navigation -->
            <div class="flex items-center gap-3 mt-5">
                <button id="btn-toggle-settings" class="nav-btn-inactive px-4 py-2 font-semibold rounded-lg border-2 border-slate-300 transition text-sm">
                    ⚙ Settings
                </button>
                <div class="w-px h-6 bg-slate-300 mx-1"></div>
                <button data-view="farming" class="nav-view-btn nav-btn-active px-4 py-2 font-semibold rounded-lg transition text-sm">
                    🌾 Farming Bonuses
                </button>
                <button data-view="landrank" class="nav-view-btn nav-btn-inactive px-4 py-2 font-semibold rounded-lg border-2 border-slate-300 transition text-sm">
                    🏆 Land Rank Optimizer
                </button>
            </div>
        </div>
    </header>

    <main class="w-full px-8 py-10">
        <!-- LOAD JSON NOTICE (Full Width) -->
        <div id="json-load-notice" class="inline-block bg-amber-100 border-l-4 border-amber-500 px-4 py-3 rounded text-sm text-amber-900 mb-6">
            ⚠️ <strong>Load JSON data first</strong> to enable manual inputs and trigger calculations
        </div>

        <!-- SETTINGS PANEL (collapsible) -->
        <div id="settings-panel" class="mb-8"></div>

        <!-- FARMING BONUSES VIEW -->
        <div id="view-farming" class="view-content"></div>

        <!-- LAND RANK OPTIMIZER VIEW -->
        <div id="view-landrank" class="view-content" style="display:none"></div>
    </main>

    <footer class="text-center py-8 px-8 border-t border-slate-200 text-slate-600 text-sm bg-white">
        Legends of IdleOn Farming Optimizer v2.0
    </footer>
    <script src="GlobalFunctions.js"></script>
    <script src="CustomList.js"></script>
    <script src="models.js"></script>
    <script src="state.js"></script>
    <!-- State Management System -->
    <script src="stateManager.js"></script>
    <script src="statePersistence.js"></script>
    <script src="stateAutoWire.js"></script>
    <script src="stateInspector.js"></script>
    <!-- End State Management System -->
    <script src="imageLinks.js"></script>
    <script src="Number2Letter.js"></script>
    <script src="calcFormulas.js"></script>
    <script src="parsers/farmingParser.js"></script>
    <script src="parsers/alchemyParser.js"></script>
    <script src="parsers/achievementsParser.js"></script>
    <script src="parsers/miscParser.js"></script>
    <script src="parsers/shinyPetsParser.js"></script>
    <script src="parsers/starSignsParser.js"></script>
    <script src="parsers/killsLeftToAdvanceParser.js"></script>
    <script src="parsers/skillLevelsParser.js"></script>
    <script src="parsers/lv0Parser.js"></script>
    <script src="UIbreakdowns.js"></script>
    <script src="js/ui/appData.js"></script>
    <script src="js/ui/renderSettings.js"></script>
    <script src="js/ui/renderFarming.js"></script>
    <script src="js/ui/renderLandrank.js"></script>
    <script src="js/ui/init.js"></script>
    <script src="js/ui/navigation.js"></script>
    <script src="js/ui/uiLoader.js"></script>
    <script>
        window.addEventListener('load', loadUIpartials);
    </script>
</body>
</html>
